name: Build APK

# Tự động chạy mỗi khi bạn push code lên nhánh main,
# hoặc bạn có thể bấm chạy tay trong tab Actions trên GitHub.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cài Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK (bản debug, cài trực tiếp được)
        run: gradle assembleDebug --stacktrace

      - name: Tải APK lên (để tải về điện thoại)
        uses: actions/upload-artifact@v4
        with:
          name: LiveCast-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
